<div class="rb-page">
  <div class="rb-container">
    <div class="rb-card overflow-hidden">
      <div class="border-b border-white/10 bg-secondary px-4 py-6 text-white dark:bg-slate-800 sm:px-6 sm:py-7 lg:px-8">
        <div class="mb-6 flex flex-col items-stretch justify-between gap-4 sm:items-start md:flex-row md:items-center">
          <h2 class="text-2xl font-semibold tracking-tight sm:text-3xl lg:text-4xl">Mi Perfil</h2>
          <div class="flex flex-col gap-2 sm:flex-row sm:flex-wrap sm:items-center">
            <a
              routerLink="/"
              class="inline-flex min-h-11 w-full items-center justify-center rounded-xl border border-white/25 bg-white/10 px-4 py-3 text-sm font-semibold text-white transition hover:bg-white/20 sm:w-max"
            >
              Volver
            </a>
            <app-logout-button variant="on-dark" />
          </div>
        </div>
        <p class="text-sm text-white/90">Actualiza tu información personal y de contacto.</p>
      </div>

      <div class="p-4 sm:p-6 lg:p-8">
        <p *ngIf="cargando()" class="text-sm text-neutral-muted dark:text-dark-text-muted">Cargando perfil...</p>

        <form *ngIf="!cargando()" (ngSubmit)="guardarCambios()" class="space-y-4">
          <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
            <div>
              <label class="rb-label !normal-case">Nombres y Apellidos</label>
              <input [(ngModel)]="form.fullName" name="fullName" class="rb-input rb-focus-secondary" required />
            </div>
            <div>
              <label class="rb-label !normal-case">Teléfono</label>
              <input
                [value]="form.phone"
                name="phone"
                inputmode="numeric"
                maxlength="9"
                class="rb-input rb-focus-secondary"
                (keydown)="bloquearNoNumerico($event)"
                (input)="soloNumeros($event, 9)"
                required
              />
            </div>
          </div>

          <div>
            <label class="rb-label !normal-case">Dirección</label>
            <input
              [(ngModel)]="form.address"
              name="address"
              class="rb-input rb-focus-secondary disabled:cursor-not-allowed disabled:opacity-60"
              [disabled]="!canEditAddress()"
              required
            />
            <p *ngIf="!canEditAddress()" class="mt-1 text-xs text-warning dark:text-amber-300">
              No puedes editar la dirección mientras tengas pedidos en curso.
            </p>
          </div>

          <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
            <div>
              <label class="rb-label !normal-case">DNI</label>
              <input
                [value]="form.dni"
                class="rb-input cursor-not-allowed opacity-60"
                readonly
                aria-readonly="true"
              />
            </div>
            <div>
              <label class="rb-label !normal-case">Correo Electrónico</label>
              <input
                [value]="form.email"
                class="rb-input cursor-not-allowed opacity-60"
                readonly
                aria-readonly="true"
              />
            </div>
            <div *ngIf="roleVisible()">
              <label class="rb-label !normal-case">Rol</label>
              <input
                [value]="form.role"
                class="rb-input cursor-not-allowed opacity-60"
                readonly
                aria-readonly="true"
              />
            </div>
          </div>

          <div class="flex flex-col gap-2 pt-2 sm:flex-row sm:flex-wrap">
            <button type="submit" [disabled]="guardando()" class="rb-btn-secondary min-h-11 border-0 bg-secondary text-white disabled:opacity-45">
              {{ guardando() ? 'Guardando...' : 'Guardar Cambios' }}
            </button>
            <button
              type="button"
              (click)="cambiarPassword()"
              [disabled]="enviandoCodigo()"
              class="rb-btn-primary min-h-11 disabled:opacity-45"
            >
              {{ enviandoCodigo() ? 'Enviando código...' : 'Cambiar Contraseña' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div *ngIf="modal() as m" class="rb-modal-backdrop">
    <div class="rb-modal max-w-sm text-center shadow-lg dark:shadow-none">
      <div class="rb-modal-icon !mb-4">
        <img
          [src]="m.tipo === 'ok' ? '/iconos/correcto-check-verde.png' : '/iconos/advertencia-amarillo.png'"
          alt=""
          width="48"
          height="48"
          class="h-12 w-12 object-contain"
        />
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-900 dark:text-dark-text-strong">{{ m.titulo }}</h3>
      <p class="mb-6 text-sm font-medium" [ngClass]="m.tipo === 'ok' ? 'text-success dark:text-emerald-300' : 'text-warning dark:text-amber-300'">
        {{ m.mensaje }}
      </p>
      <button
        type="button"
        (click)="cerrarModal()"
        class="w-full sm:w-max"
        [ngClass]="m.tipo === 'ok' ? 'rb-btn-success' : 'rb-btn-secondary'"
      >
        Entendido
      </button>
    </div>
  </div>
</div>
