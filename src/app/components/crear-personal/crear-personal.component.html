<div class="rb-page">
  <div class="rb-container-tight mx-auto max-w-7xl">
    <div class="rb-card overflow-hidden">
      <div class="border-b border-white/10 bg-secondary px-6 py-7 text-white sm:px-8">
        <div class="flex flex-col items-start justify-between gap-4 md:flex-row md:items-center">
          <div>
            <h2 class="text-xl font-semibold tracking-tight sm:text-2xl">
              Crear Cuenta para Personal
            </h2>
            <p class="mt-2 max-w-2xl text-sm text-white/80">
              Da de alta a nuevos cajeros, cocineros y repartidores en el sistema.
            </p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <a
              routerLink="/gestion-administrador"
              class="inline-flex items-center rounded-xl border border-white/25 bg-white/10 px-4 py-2 text-sm font-semibold text-white transition hover:bg-white/20"
              >Volver al Panel</a
            >
            <app-logout-button variant="on-dark" />
          </div>
        </div>
      </div>

      <form (ngSubmit)="crearCuenta()" class="space-y-8 p-6 sm:p-8">
        <div>
          <label class="rb-label !normal-case">1. Selecciona el Rol</label>
          <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
            <button
              type="button"
              (click)="seleccionarRol('CAJERO')"
              [ngClass]="
                empleado.role === 'CAJERO'
                  ? 'border-secondary bg-secondary text-white ring-2 ring-secondary/20'
                  : 'border-gray-200 bg-gray-50 text-neutral-strong hover:bg-gray-100'
              "
              class="rounded-xl border p-4 text-sm font-semibold transition"
            >
              CAJERO
            </button>
            <button
              type="button"
              (click)="seleccionarRol('COCINERO')"
              [ngClass]="
                empleado.role === 'COCINERO'
                  ? 'border-primary bg-primary text-white ring-2 ring-primary/25'
                  : 'border-gray-200 bg-gray-50 text-neutral-strong hover:bg-gray-100'
              "
              class="rounded-xl border p-4 text-sm font-semibold transition"
            >
              COCINERO
            </button>
            <button
              type="button"
              (click)="seleccionarRol('REPARTIDOR')"
              [ngClass]="
                empleado.role === 'REPARTIDOR'
                  ? 'border-success bg-success text-white ring-2 ring-success/25'
                  : 'border-gray-200 bg-gray-50 text-neutral-strong hover:bg-gray-100'
              "
              class="rounded-xl border p-4 text-sm font-semibold transition"
            >
              REPARTIDOR
            </button>
          </div>
        </div>

        <div class="rb-divider pt-2">
          <label class="rb-label !normal-case">2. Datos Personales</label>
          <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <div>
              <label class="rb-label !normal-case">Nombres</label>
              <input
                type="text"
                (input)="empleado.nombres = soloLetras($event, 60)"
                [value]="empleado.nombres"
                name="n"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div>
              <label class="rb-label !normal-case">Apellidos</label>
              <input
                type="text"
                (input)="empleado.apellidos = soloLetras($event, 60)"
                [value]="empleado.apellidos"
                name="a"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div>
              <label class="rb-label !normal-case">DNI</label>
              <input
                type="text"
                inputmode="numeric"
                autocomplete="off"
                (keydown)="bloquearNoNumerico($event)"
                (input)="empleado.dni = soloNumeros($event, 8)"
                [value]="empleado.dni"
                name="dni"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div>
              <label class="rb-label !normal-case">Teléfono</label>
              <input
                type="text"
                inputmode="numeric"
                autocomplete="off"
                (keydown)="bloquearNoNumerico($event)"
                (input)="empleado.phone = soloNumeros($event, 9)"
                [value]="empleado.phone"
                name="tel"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div class="md:col-span-2">
              <label class="rb-label !normal-case">Correo electrónico</label>
              <input
                type="email"
                [(ngModel)]="empleado.email"
                name="em"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div class="md:col-span-2">
              <label class="rb-label !normal-case">Dirección</label>
              <input
                type="text"
                [(ngModel)]="empleado.address"
                name="dir"
                class="rb-input rb-focus-secondary"
              />
            </div>
          </div>
        </div>

        <button type="submit" [disabled]="cargando" class="rb-btn-secondary disabled:opacity-70">
          <span
            *ngIf="cargando"
            class="h-5 w-5 animate-spin rounded-full border-2 border-white border-t-transparent"
          ></span>
          {{ cargando ? 'Registrando empleado...' : 'Crear Empleado' }}
        </button>
      </form>
    </div>
  </div>

  <div *ngIf="modal.visible" class="rb-modal-backdrop">
    <div class="rb-modal max-w-sm">
      <div class="rb-modal-icon !mb-6">
        <img
          [src]="
            modal.tipo === 'error'
              ? '/iconos/error-rojo.png'
              : modal.tipo === 'advertencia'
                ? '/iconos/advertencia-amarillo.png'
                : '/iconos/correcto-check-verde.png'
          "
          [attr.alt]="
            modal.tipo === 'error' ? 'Error' : modal.tipo === 'advertencia' ? 'Advertencia' : 'Éxito'
          "
          width="48"
          height="48"
          class="h-12 w-12 object-contain"
        />
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-900">{{ modal.titulo }}</h3>
      <p class="mb-8 text-sm text-neutral-strong">{{ modal.mensaje }}</p>

      <button
        type="button"
        (click)="cerrarModal()"
        class="inline-flex w-full items-center justify-center gap-2 rounded-xl px-4 py-3.5 text-sm font-semibold text-white shadow-sm transition hover:opacity-95"
        [ngClass]="
          modal.tipo === 'error' ? 'bg-danger' : modal.tipo === 'advertencia' ? 'bg-warning' : 'bg-secondary'
        "
      >
        Entendido
      </button>
    </div>
  </div>
</div>
