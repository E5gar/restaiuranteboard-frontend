<div class="rb-page">
  <div class="rb-container">
    <div class="rb-card overflow-hidden">
      <div class="border-b border-white/10 bg-secondary px-4 py-6 text-white sm:px-6 sm:py-7 lg:px-8">
        <div class="flex flex-col items-stretch justify-between gap-4 md:flex-row md:items-center">
          <div>
            <h2 class="text-2xl font-semibold tracking-tight sm:text-3xl lg:text-4xl">
              Crear Cuenta para Personal
            </h2>
            <p class="mt-2 max-w-2xl text-sm text-white/80 lg:text-base">
              Da de alta a nuevos cajeros, cocineros y repartidores en el sistema.
            </p>
          </div>
          <div class="flex flex-col gap-2 sm:flex-row sm:flex-wrap sm:items-center">
            <a
              routerLink="/gestion-administrador"
              class="inline-flex min-h-11 w-full items-center justify-center rounded-xl border border-white/25 bg-white/10 px-4 py-3 text-sm font-semibold text-white transition hover:bg-white/20 sm:w-max"
              >Volver al Panel</a
            >
            <app-logout-button variant="on-dark" />
          </div>
        </div>
      </div>

      <form (ngSubmit)="crearCuenta()" class="space-y-8 p-4 sm:p-6 lg:p-8">
        <div>
          <label class="rb-label !normal-case">1. Selecciona el Rol</label>
          <div class="grid grid-cols-1 gap-3 sm:grid-cols-3 sm:gap-4">
            <button
              type="button"
              (click)="seleccionarRol('CAJERO')"
              [ngClass]="
                empleado.role === 'CAJERO'
                  ? 'border-secondary bg-secondary text-white ring-2 ring-secondary/20'
                  : 'border-gray-200 bg-gray-50 text-neutral-strong hover:bg-gray-100'
              "
              class="min-h-11 rounded-xl border p-4 text-sm font-semibold transition"
            >
              CAJERO
            </button>
            <button
              type="button"
              (click)="seleccionarRol('COCINERO')"
              [ngClass]="
                empleado.role === 'COCINERO'
                  ? 'border-primary bg-primary text-white ring-2 ring-primary/25'
                  : 'border-gray-200 bg-gray-50 text-neutral-strong hover:bg-gray-100'
              "
              class="min-h-11 rounded-xl border p-4 text-sm font-semibold transition"
            >
              COCINERO
            </button>
            <button
              type="button"
              (click)="seleccionarRol('REPARTIDOR')"
              [ngClass]="
                empleado.role === 'REPARTIDOR'
                  ? 'border-success bg-success text-white ring-2 ring-success/25'
                  : 'border-gray-200 bg-gray-50 text-neutral-strong hover:bg-gray-100'
              "
              class="min-h-11 rounded-xl border p-4 text-sm font-semibold transition"
            >
              REPARTIDOR
            </button>
          </div>
        </div>

        <div class="rb-divider pt-2">
          <label class="rb-label !normal-case">2. Datos Personales</label>
          <div class="grid grid-cols-1 gap-4 sm:gap-6 md:grid-cols-2">
            <div>
              <label class="rb-label !normal-case">Nombres</label>
              <input
                type="text"
                (input)="empleado.nombres = soloLetras($event, 60)"
                [value]="empleado.nombres"
                name="n"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div>
              <label class="rb-label !normal-case">Apellidos</label>
              <input
                type="text"
                (input)="empleado.apellidos = soloLetras($event, 60)"
                [value]="empleado.apellidos"
                name="a"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div>
              <label class="rb-label !normal-case">DNI</label>
              <input
                type="text"
                inputmode="numeric"
                autocomplete="off"
                (keydown)="bloquearNoNumerico($event)"
                (input)="empleado.dni = soloNumeros($event, 8)"
                [value]="empleado.dni"
                name="dni"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div>
              <label class="rb-label !normal-case">Teléfono</label>
              <input
                type="text"
                inputmode="numeric"
                autocomplete="off"
                (keydown)="bloquearNoNumerico($event)"
                (input)="empleado.phone = soloNumeros($event, 9)"
                [value]="empleado.phone"
                name="tel"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div class="md:col-span-2">
              <label class="rb-label !normal-case">Correo electrónico</label>
              <input
                type="email"
                [(ngModel)]="empleado.email"
                name="em"
                class="rb-input rb-focus-secondary"
              />
            </div>
            <div class="md:col-span-2">
              <label class="rb-label !normal-case">Dirección</label>
              <input
                type="text"
                [(ngModel)]="empleado.address"
                name="dir"
                class="rb-input rb-focus-secondary"
              />
            </div>
          </div>
        </div>

        <button type="submit" [disabled]="cargando" class="rb-btn-secondary disabled:opacity-70">
          <span
            *ngIf="cargando"
            class="h-5 w-5 animate-spin rounded-full border-2 border-white border-t-transparent"
          ></span>
          {{ cargando ? 'Registrando empleado...' : 'Crear Empleado' }}
        </button>
      </form>
    </div>
  </div>

  <div *ngIf="modal.visible" class="rb-modal-backdrop">
    <div class="rb-modal max-w-sm">
      <div
        class="rb-modal-icon !mb-6"
        [ngClass]="{
          'bg-red-50 ring-red-200/80 dark:bg-red-950/45 dark:ring-red-900/50': modal.tipo === 'error',
          'bg-amber-50 ring-amber-200/80 dark:bg-amber-950/40 dark:ring-amber-800/40': modal.tipo === 'advertencia',
          'bg-emerald-50 ring-emerald-200/80 dark:bg-emerald-950/35 dark:ring-emerald-900/45': modal.tipo === 'exito',
        }"
      >
        <img
          [src]="
            modal.tipo === 'error'
              ? '/iconos/error-rojo.png'
              : modal.tipo === 'advertencia'
                ? '/iconos/advertencia-amarillo.png'
                : '/iconos/correcto-check-verde.png'
          "
          [attr.alt]="
            modal.tipo === 'error' ? 'Error' : modal.tipo === 'advertencia' ? 'Advertencia' : 'Éxito'
          "
          width="48"
          height="48"
          class="h-12 w-12 object-contain"
        />
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-900 dark:text-dark-text-strong">{{ modal.titulo }}</h3>
      <p
        class="mb-8 text-sm lg:text-base"
        [ngClass]="{
          'font-medium text-danger dark:text-red-200': modal.tipo === 'error',
          'font-medium text-amber-900 dark:text-amber-200': modal.tipo === 'advertencia',
          'text-emerald-800 dark:text-emerald-200': modal.tipo === 'exito',
          'text-neutral-strong dark:text-dark-text-muted':
            modal.tipo !== 'error' && modal.tipo !== 'advertencia' && modal.tipo !== 'exito',
        }"
      >
        {{ modal.mensaje }}
      </p>

      <div class="flex justify-center">
        <button
          type="button"
          (click)="cerrarModal()"
          class="w-full sm:w-max"
          [ngClass]="
            modal.tipo === 'error'
              ? 'rb-btn-danger'
              : modal.tipo === 'advertencia'
                ? 'inline-flex min-h-11 items-center justify-center gap-2 rounded-xl bg-warning px-4 py-3.5 text-sm font-semibold text-white shadow-sm transition hover:opacity-95'
                : 'rb-btn-secondary'
          "
        >
          Entendido
        </button>
      </div>
    </div>
  </div>
</div>
