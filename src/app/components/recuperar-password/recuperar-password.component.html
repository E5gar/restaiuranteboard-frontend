<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
  <div
    class="max-w-md w-full bg-white shadow-2xl rounded-3xl p-10 border border-gray-100 animate-in fade-in duration-300"
  >
    <div class="text-center mb-8">
      <div
        class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
      >
        <span class="text-2xl">🔐</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Recuperar Contraseña</h1>
      <p class="text-gray-500 text-sm mt-2">Te enviaremos un código seguro.</p>
    </div>

    <!-- PASO 1: PEDIR EMAIL -->
    <form (ngSubmit)="enviarCodigo()" *ngIf="paso === 1" class="space-y-6">
      <div>
        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Email registrado</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 transition-all"
          placeholder="correo@ejemplo.com"
          required
        />
      </div>

      <button
        type="submit"
        [disabled]="cargando"
        class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center gap-2"
      >
        <span
          *ngIf="cargando"
          class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"
        ></span>
        {{ cargando ? 'Buscando cuenta...' : 'Enviar Código' }}
      </button>

      <p class="text-center text-sm">
        <a routerLink="/login" class="text-gray-400 hover:text-indigo-600 transition"
          >Volver al Login</a
        >
      </p>
    </form>

    <!-- PASO 2: NUEVA CLAVE Y CÓDIGO -->
    <form (ngSubmit)="resetearPassword()" *ngIf="paso === 2" class="space-y-4">
      <div class="bg-indigo-50 p-4 rounded-2xl mb-6">
        <p class="text-xs text-center text-indigo-800 font-bold mb-2">CÓDIGO DE 6 DÍGITOS</p>
        <input
          type="text"
          (input)="codigo = soloNumeros($event, 6)"
          [value]="codigo"
          class="w-full p-3 text-center text-3xl tracking-[0.5em] font-mono bg-white border border-indigo-200 rounded-xl outline-none focus:border-indigo-500"
          placeholder="000000"
          required
        />
      </div>

      <div class="relative">
        <input
          [type]="verPass ? 'text' : 'password'"
          [(ngModel)]="nuevaPassword"
          name="npw"
          placeholder="Nueva Contraseña"
          class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400"
          required
        />
        <button
          type="button"
          (click)="verPass = !verPass"
          class="absolute right-4 top-4 opacity-40"
        >
          {{ verPass ? '👁️' : '🙈' }}
        </button>
      </div>

      <div class="relative">
        <input
          [type]="verConfirmarPass ? 'text' : 'password'"
          [(ngModel)]="confirmarPassword"
          name="cpw"
          placeholder="Confirmar Nueva Contraseña"
          class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400"
          required
        />
        <button
          type="button"
          (click)="verConfirmarPass = !verConfirmarPass"
          class="absolute right-4 top-4 opacity-40"
        >
          {{ verConfirmarPass ? '👁️' : '🙈' }}
        </button>
      </div>

      <!-- Checklist de Seguridad -->
      <div class="text-[10px] grid grid-cols-2 gap-1 text-gray-500 px-2 py-2">
        <p [class.text-green-600]="nuevaPassword.length >= 8">✓ 8+ caracteres</p>
        <p [class.text-green-600]="/[A-Z]/.test(nuevaPassword)">✓ Mayúscula</p>
        <p [class.text-green-600]="/[a-z]/.test(nuevaPassword)">✓ Minúscula</p>
        <p [class.text-green-600]="/[@!¡¿?#$%/&]/.test(nuevaPassword)">✓ Especial</p>
      </div>

      <button
        type="submit"
        [disabled]="cargando"
        class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-100 hover:bg-green-700 transition-all flex justify-center items-center gap-2 mt-4"
      >
        <span
          *ngIf="cargando"
          class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"
        ></span>
        {{ cargando ? 'Actualizando...' : 'Cambiar Contraseña' }}
      </button>

      <p class="text-center text-xs mt-4">
        <button type="button" (click)="paso = 1" class="text-gray-400 underline">
          Usar otro correo
        </button>
      </p>
    </form>
  </div>

  <!-- MODAL DINÁMICO REUTILIZABLE -->
  <div
    *ngIf="modal.visible"
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
  >
    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center">
      <div
        [ngClass]="modal.esError ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'"
        class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-4 text-2xl font-bold"
      >
        {{ modal.esError ? '!' : '✓' }}
      </div>
      <h3 class="text-xl font-bold mb-2">{{ modal.titulo }}</h3>
      <p class="text-gray-500 mb-6 text-sm">{{ modal.mensaje }}</p>
      <button
        (click)="cerrarModal()"
        [disabled]="cargando"
        class="w-full py-3 rounded-xl font-bold text-white transition flex justify-center items-center gap-2"
        [ngClass]="
          modal.esExpirado
            ? 'bg-orange-500 hover:bg-orange-600'
            : modal.esError
              ? 'bg-red-600 hover:bg-red-700'
              : 'bg-indigo-600 hover:bg-indigo-700'
        "
      >
        <span
          *ngIf="cargando"
          class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"
        ></span>
        {{ modal.esExpirado ? 'Reenviar Código' : 'Entendido' }}
      </button>
    </div>
  </div>
</div>
