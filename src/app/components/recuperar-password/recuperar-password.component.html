<div class="rb-page-center relative">
  <div class="rb-shell-sm rb-card rb-card-pad">
    <div class="mb-8 text-center">
      <div
        class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-secondary/10"
      >
        <img
          src="/iconos/candado.png"
          alt=""
          width="40"
          height="40"
          class="h-10 w-10 object-contain"
        />
      </div>
      <h1 class="text-xl font-semibold text-gray-900 sm:text-2xl">Recuperar Contraseña</h1>
      <p class="rb-kicker mt-2">Te enviaremos un código para validar tu identidad.</p>
    </div>

    <form (ngSubmit)="enviarCodigo()" *ngIf="paso === 1" class="space-y-5">
      <div>
        <label class="rb-label ml-0.5">Email registrado</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="rb-input rb-focus-primary"
          required
        />
      </div>

      <button type="submit" [disabled]="cargando" class="rb-btn-primary">
        <span
          *ngIf="cargando"
          class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
        ></span>
        {{ cargando ? 'Buscando cuenta...' : 'Enviar Código' }}
      </button>

      <p class="text-center text-sm">
        <a
          routerLink="/login"
          class="text-neutral-muted transition hover:text-secondary hover:underline"
          >Volver al Login</a
        >
      </p>
    </form>

    <form (ngSubmit)="resetearPassword()" *ngIf="paso === 2" class="space-y-4">
      <div class="mb-2 rounded-2xl border border-warning/25 bg-warning/10 p-4">
        <label class="rb-label !mb-1 !text-center">Código de 6 dígitos</label>
        <input
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          (keydown)="bloquearNoNumerico($event)"
          (input)="codigo = soloNumeros($event, 6)"
          [value]="codigo"
          class="rb-input rb-focus-secondary text-center font-mono text-2xl tracking-[0.45em] sm:text-3xl"
          required
        />
      </div>

      <div>
        <label class="rb-label ml-0.5">Nueva contraseña</label>
        <div class="relative">
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="nuevaPassword"
          name="npw"
          class="rb-input rb-focus-primary pr-24"
          required
        />
        <button
          type="button"
          (click)="mostrarPassword = !mostrarPassword"
          class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-neutral-muted transition hover:opacity-80"
          [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <img
            [src]="mostrarPassword ? '/iconos/ojo-abierto.png' : '/iconos/ojo-cerrado.png'"
            alt=""
            width="20"
            height="20"
            class="h-5 w-5 object-contain"
          />
        </button>
        </div>
      </div>

      <div>
        <label class="rb-label ml-0.5">Confirmar nueva contraseña</label>
        <div class="relative">
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="confirmarPassword"
          name="cpw"
          class="rb-input rb-focus-primary pr-24"
          required
        />
        <button
          type="button"
          (click)="mostrarPassword = !mostrarPassword"
          class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-neutral-muted transition hover:opacity-80"
          [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <img
            [src]="mostrarPassword ? '/iconos/ojo-abierto.png' : '/iconos/ojo-cerrado.png'"
            alt=""
            width="20"
            height="20"
            class="h-5 w-5 object-contain"
          />
        </button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-1 px-0.5 py-2 text-[10px] text-neutral-muted">
        <p [class.text-success]="nuevaPassword.length >= 8" class="inline-flex items-center gap-1">
          <img src="/iconos/correcto-check-verde.png" alt="" width="12" height="12" class="h-3 w-3 object-contain" />
          8+ caracteres
        </p>
        <p [class.text-success]="/[A-Z]/.test(nuevaPassword)" class="inline-flex items-center gap-1">
          <img src="/iconos/correcto-check-verde.png" alt="" width="12" height="12" class="h-3 w-3 object-contain" />
          Mayúscula
        </p>
        <p [class.text-success]="/[a-z]/.test(nuevaPassword)" class="inline-flex items-center gap-1">
          <img src="/iconos/correcto-check-verde.png" alt="" width="12" height="12" class="h-3 w-3 object-contain" />
          Minúscula
        </p>
        <p [class.text-success]="/[@!¡¿?#$%/&]/.test(nuevaPassword)" class="inline-flex items-center gap-1">
          <img src="/iconos/correcto-check-verde.png" alt="" width="12" height="12" class="h-3 w-3 object-contain" />
          Especial
        </p>
      </div>

      <button type="submit" [disabled]="cargando" class="rb-btn-success mt-2">
        <span
          *ngIf="cargando"
          class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
        ></span>
        {{ cargando ? 'Actualizando...' : 'Cambiar Contraseña' }}
      </button>

      <p class="mt-4 text-center text-xs">
        <button
          type="button"
          (click)="paso = 1"
          class="text-neutral-muted underline hover:text-primary"
        >
          Usar otro correo
        </button>
      </p>
    </form>
  </div>

  <div *ngIf="modal.visible" class="rb-modal-backdrop">
    <div class="rb-modal max-w-sm">
      <div class="rb-modal-icon !mb-4 !text-2xl">
        <img
          [src]="modal.esExpirado ? '/iconos/advertencia-amarillo.png' : modal.esError ? '/iconos/error-rojo.png' : '/iconos/correcto-check-verde.png'"
          [attr.alt]="modal.esExpirado ? 'Advertencia' : modal.esError ? 'Error' : 'Éxito'"
          width="48"
          height="48"
          class="h-12 w-12 object-contain"
        />
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-900">{{ modal.titulo }}</h3>
      <p class="mb-6 text-sm text-neutral-strong">{{ modal.mensaje }}</p>
      <button
        type="button"
        (click)="cerrarModal()"
        [disabled]="cargando"
        class="inline-flex w-full items-center justify-center gap-2 rounded-xl px-4 py-3.5 text-sm font-semibold text-white shadow-sm transition hover:opacity-95 disabled:opacity-50"
        [ngClass]="modal.esExpirado ? 'bg-warning' : modal.esError ? 'bg-danger' : 'bg-secondary'"
      >
        <span
          *ngIf="cargando"
          class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
        ></span>
        {{ modal.esExpirado ? 'Reenviar Código' : 'Entendido' }}
      </button>
    </div>
  </div>
</div>
