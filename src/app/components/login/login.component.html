<div class="rb-page-center relative">
  <div class="rb-shell-sm rb-card rb-card-pad">
    <div class="mb-8 text-center">
      <div class="mb-4 flex justify-center">
        <span class="rb-logo-chip max-w-full">
          <img
            [src]="logoSrc"
            [attr.alt]="logoEsDelNegocio ? 'Logo del negocio' : ''"
            class="h-8 w-auto max-w-[200px] object-contain sm:h-12 sm:max-h-20 sm:max-w-[220px]"
          />
        </span>
      </div>
      <h1 class="rb-heading">{{ tituloMarca }}</h1>
      <p class="rb-kicker mt-2">Bienvenido de nuevo, por favor inicia sesión.</p>
    </div>

    <form (ngSubmit)="onLogin()" class="space-y-5">
      <div>
        <label class="rb-label ml-0.5">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="rb-input rb-focus-primary"
          autocomplete="username"
        />
      </div>

      <div>
        <label class="rb-label ml-0.5">Contraseña</label>
        <div class="relative">
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="pass"
            class="rb-input rb-focus-primary pr-24"
            autocomplete="current-password"
          />
          <button
            type="button"
            (click)="mostrarPassword = !mostrarPassword"
            class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-neutral-muted transition hover:opacity-80 dark:text-slate-400"
            [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <img
              [src]="mostrarPassword ? '/iconos/ojo-abierto.png' : '/iconos/ojo-cerrado.png'"
              alt=""
              width="20"
              height="20"
              class="h-5 w-5 object-contain"
            />
          </button>
        </div>
      </div>

      <div
        class="flex flex-col gap-3 px-0.5 text-sm font-medium sm:flex-row sm:items-center sm:justify-between lg:text-base"
      >
        <a
          routerLink="/recuperar"
          class="text-secondary underline-offset-2 transition hover:underline dark:text-sky-300 dark:hover:text-sky-200"
          >¿Olvidaste tu contraseña?</a
        >
        <a
          routerLink="/registro"
          class="text-neutral-muted transition hover:text-primary dark:text-slate-300 dark:hover:text-primary"
          >Crear cuenta</a
        >
      </div>

      <div class="flex justify-center">
        <button type="submit" [disabled]="cargando" class="rb-btn-primary">
        <span
          *ngIf="cargando"
          class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
        ></span>
        {{ cargando ? 'Verificando...' : 'Iniciar Sesión' }}
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="modal.visible" class="rb-modal-backdrop">
    <div class="rb-modal border-gray-200">
      <div
        class="rb-modal-icon"
        [ngClass]="
          modal.esError
            ? 'bg-red-50 text-danger ring-red-200/80 dark:bg-red-950/45 dark:ring-red-900/50'
            : 'bg-amber-50 text-amber-700 ring-amber-200/80 dark:bg-amber-950/40 dark:text-amber-200 dark:ring-amber-800/40'
        "
      >
        <img
          [src]="modal.esError ? '/iconos/error-rojo.png' : '/iconos/advertencia-amarillo.png'"
          [attr.alt]="modal.esError ? 'Error' : 'Advertencia'"
          width="42"
          height="42"
          class="h-10 w-10 object-contain"
        />
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-900 dark:text-dark-text-strong">{{ modal.titulo }}</h3>
      <p
        class="mb-6 text-sm"
        [ngClass]="
          modal.esError
            ? 'font-medium text-danger/90 dark:text-red-200'
            : 'text-neutral-strong dark:text-dark-text-muted'
        "
      >
        {{ modal.mensaje }}
      </p>
      <div class="flex justify-center">
        <button (click)="cerrarModal()" type="button" class="rb-btn-secondary">Aceptar</button>
      </div>
    </div>
  </div>

  <div *ngIf="modalDisponibilidad.visible" class="rb-modal-backdrop z-[60]">
    <div class="rb-modal max-w-lg text-left">
      <div
        class="rb-modal-icon !mb-5 !bg-white !text-3xl !ring-2 !ring-gray-200 dark:!bg-white dark:!ring-dark-border"
      >
        <img
          src="/iconos/advertencia-amarillo.png"
          alt=""
          width="48"
          height="48"
          class="h-12 w-12 object-contain"
        />
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-900 dark:text-dark-text-strong">Actualización de disponibilidad</h3>
      <p class="mb-3 text-sm text-neutral-strong dark:text-dark-text-muted">
        Algunos productos que tenías en tu carrito ya no se encuentran disponibles y han sido retirados:
      </p>
      <ul
        class="mb-6 max-h-48 list-inside list-disc overflow-y-auto rounded-lg border border-amber-200/80 bg-amber-50/90 px-3 py-2 text-sm text-gray-900 dark:border-amber-500/30 dark:bg-amber-950/40 dark:text-amber-100"
        *ngIf="modalDisponibilidad.items.length > 0"
      >
        <li *ngFor="let nombre of modalDisponibilidad.items">{{ nombre }}</li>
      </ul>
      <div class="flex justify-center sm:justify-end">
        <button type="button" (click)="cerrarModalDisponibilidad()" class="rb-btn-primary w-full sm:w-max">Entendido</button>
      </div>
    </div>
  </div>
</div>
