<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl p-10 border border-gray-100">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-black text-indigo-600 italic">Restaiuranteboard</h1>
      <p class="text-gray-400 text-sm mt-2">Bienvenido de nuevo, por favor ingresa.</p>
    </div>

    <form (ngSubmit)="onLogin()" class="space-y-6">
      <div>
        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 transition-all"
          placeholder="correo@ejemplo.com"
        />
      </div>

      <div class="relative">
        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Contraseña</label>
        <input
          [type]="verPass ? 'text' : 'password'"
          [(ngModel)]="password"
          name="pass"
          class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 transition-all"
        />
        <button
          type="button"
          (click)="verPass = !verPass"
          class="absolute right-4 top-10 opacity-30 hover:opacity-100 transition"
        >
          {{ verPass ? '👁️' : '🙈' }}
        </button>
      </div>

      <div class="flex justify-between items-center text-xs font-semibold px-1">
        <a routerLink="/recuperar" class="text-indigo-600 hover:underline">¿Olvidaste tu clave?</a>
        <a routerLink="/registro" class="text-gray-400 hover:text-indigo-600 transition"
          >Crear cuenta</a
        >
      </div>

      <button
        type="submit"
        [disabled]="cargando"
        class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center gap-3"
      >
        <span
          *ngIf="cargando"
          class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"
        ></span>
        {{ cargando ? 'Verificando...' : 'Iniciar Sesión' }}
      </button>
    </form>
  </div>

  <!-- MODAL (Reutiliza el mismo del setup-inicial) -->
  <div
    *ngIf="modal.visible"
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
  >
    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center">
      <div class="text-red-500 text-5xl mb-4">!</div>
      <h3 class="text-xl font-bold mb-2">{{ modal.titulo }}</h3>
      <p class="text-gray-500 mb-6 text-sm">{{ modal.mensaje }}</p>
      <button
        (click)="modal.visible = false"
        class="w-full py-3 bg-gray-800 text-white rounded-xl font-bold"
      >
        Cerrar
      </button>
    </div>
  </div>
</div>
