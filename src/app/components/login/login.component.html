<div class="rb-page-center relative">
  <div class="rb-shell-sm rb-card rb-card-pad">
    <div class="mb-8 text-center">
      <div class="mb-4 flex justify-center">
        <img
          [src]="logoSrc"
          [attr.alt]="logoEsDelNegocio ? 'Logo del negocio' : ''"
          class="max-h-20 w-auto max-w-[220px] object-contain"
        />
      </div>
      <h1 class="rb-heading">{{ tituloMarca }}</h1>
      <p class="rb-kicker mt-2">Bienvenido de nuevo, por favor inicia sesión.</p>
    </div>

    <form (ngSubmit)="onLogin()" class="space-y-5">
      <div>
        <label class="rb-label ml-0.5">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="rb-input rb-focus-primary"
          autocomplete="username"
        />
      </div>

      <div>
        <label class="rb-label ml-0.5">Contraseña</label>
        <div class="relative">
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="pass"
            class="rb-input rb-focus-primary pr-24"
            autocomplete="current-password"
          />
          <button
            type="button"
            (click)="mostrarPassword = !mostrarPassword"
            class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-neutral-muted transition hover:opacity-80"
            [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <img
              [src]="mostrarPassword ? '/iconos/ojo-abierto.png' : '/iconos/ojo-cerrado.png'"
              alt=""
              width="20"
              height="20"
              class="h-5 w-5 object-contain"
            />
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between px-0.5 text-xs font-medium">
        <a routerLink="/recuperar" class="text-secondary hover:underline">¿Olvidaste tu contraseña?</a>
        <a routerLink="/registro" class="text-neutral-muted transition hover:text-primary"
          >Crear cuenta</a
        >
      </div>

      <button type="submit" [disabled]="cargando" class="rb-btn-primary">
        <span
          *ngIf="cargando"
          class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
        ></span>
        {{ cargando ? 'Verificando...' : 'Iniciar Sesión' }}
      </button>
    </form>
  </div>

  <div *ngIf="modal.visible" class="rb-modal-backdrop">
    <div class="rb-modal border-gray-200">
      <div class="rb-modal-icon bg-red-50 text-danger">
        <img src="/iconos/error-rojo.png" alt="Error" width="42" height="42" class="h-10 w-10 object-contain" />
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-900">{{ modal.titulo }}</h3>
      <p class="mb-6 text-sm font-medium text-danger/90">{{ modal.mensaje }}</p>
      <button (click)="cerrarModal()" type="button" class="rb-btn-secondary">Aceptar</button>
    </div>
  </div>
</div>
