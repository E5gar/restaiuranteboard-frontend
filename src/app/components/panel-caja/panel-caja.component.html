<div class="rb-page flex min-h-screen flex-col">
  <nav class="rb-nav bg-secondary text-white shadow-sm dark:shadow-none">
    <h1 class="rb-nav-title text-white">Panel de Caja</h1>
    <app-logout-button variant="on-dark" />
  </nav>

  <div class="rb-container flex-1">
    <div class="rb-section !p-0 overflow-hidden">
      <h2
        class="border-b border-gray-100 px-4 py-4 text-lg font-semibold text-secondary sm:px-6 sm:py-5 sm:text-xl dark:border-dark-border dark:text-blue-400"
      >
        Solicitudes de Órdenes
      </h2>

      <div class="hidden overflow-x-auto md:block">
        <table class="w-full min-w-[640px] border-collapse text-left text-sm">
          <thead>
            <tr class="rb-table-header-row">
              <th class="p-4">Orden ID</th>
              <th class="p-4">Cliente</th>
              <th class="p-4">Total</th>
              <th class="p-4">Comprobante</th>
              <th class="p-4 text-center">Acciones</th>
            </tr>
          </thead>
          <tbody class="text-gray-900 dark:text-dark-text-strong">
            <tr class="border-b border-gray-100 transition hover:bg-gray-50/80 dark:border-dark-border dark:hover:bg-slate-900/50">
              <td class="p-4 font-mono text-xs">#ORD-1234</td>
              <td class="p-4 font-medium">Cargando...</td>
              <td class="p-4 font-semibold text-success">$0.00</td>
              <td class="p-4">
                <button
                  type="button"
                  class="text-sm font-medium text-secondary underline-offset-2 hover:underline dark:text-blue-400"
                >
                  Ver Imagen
                </button>
              </td>
              <td class="p-4">
                <div class="flex flex-col items-stretch justify-center gap-2 sm:flex-row sm:flex-wrap sm:items-center">
                  <button type="button" class="rb-btn-success rb-btn-sm px-4 sm:!w-auto">Aprobar</button>
                  <button type="button" class="rb-btn-danger rb-btn-sm px-4 sm:!w-auto">Rechazar</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="block space-y-4 p-4 md:hidden">
        <article class="rb-card p-4 shadow-sm">
          <div class="flex items-start justify-between gap-2 border-b border-gray-100 pb-3 dark:border-dark-border">
            <span class="font-mono text-xs text-neutral-strong">#ORD-1234</span>
            <span class="text-sm font-semibold text-success">$0.00</span>
          </div>
          <p class="mt-3 text-sm font-medium text-gray-900 lg:text-base dark:text-dark-text-strong">Cargando...</p>
          <button
            type="button"
            class="mt-3 text-sm font-medium text-secondary underline-offset-2 hover:underline dark:text-blue-400"
          >
            Ver comprobante
          </button>
          <div class="mt-4 flex flex-col gap-2 sm:flex-row sm:gap-2">
            <button type="button" class="rb-btn-success rb-btn-sm px-4 sm:flex-1 sm:!w-auto">Aprobar</button>
            <button type="button" class="rb-btn-danger rb-btn-sm px-4 sm:flex-1 sm:!w-auto">Rechazar</button>
          </div>
        </article>
      </div>
    </div>
  </div>
</div>
